name: Deploy to Cloudflare Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
    # Manual trigger so feature branches can be previewed on Cloudflare Pages
    # without merging. Pick the branch in the GitHub UI ("Run workflow" → ref);
    # the ref's branch name is forwarded to `pages deploy --branch=...`, which
    # CF Pages turns into a preview URL at <slug>.ramen-bones-analytics.pages.dev.
jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # PUBLIC_* vars are inlined into the SvelteKit build by Vite, so they must
      # be present at build time — not just in the Pages runtime environment.
      PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
      PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install deps
        run: npm ci
      - name: Build SvelteKit (adapter-cloudflare)
        run: npm run build
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@9681c2997648301493e78cacbfb790a9f19c833f # v3.9.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # `github.ref_name` resolves to "main" for push-to-main (production
          # deploy) and to the feature branch name for workflow_dispatch
          # (preview deploy). CF Pages production-vs-preview routing is
          # determined by whether --branch matches the production branch
          # configured in the project; everything else becomes a preview URL.
          command: pages deploy .svelte-kit/cloudflare --project-name=ramen-bones-analytics --branch=${{ github.ref_name }} --commit-hash=${{ github.sha }}
