name: Forecast Backtest
on:
  push:
    paths:
      - 'data/**'   # fire when owner drops a new data file
  workflow_dispatch: {}   # manual trigger when needed; models driven by feature_flags

# Commit-back of ACCURACY-LOG.md needs write access.
# All other forecast workflows are contents:read.
permissions:
  contents: write

# Queue runs; never cancel in-flight to avoid half-written forecast_quality rows.
concurrency:
  group: forecast-backtest
  cancel-in-progress: false

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/forecast/requirements.txt
      - name: Cache cmdstan binary
        uses: actions/cache@v4
        with:
          path: ~/.cmdstan
          key: cmdstan-${{ runner.os }}-${{ hashFiles('scripts/forecast/requirements.txt') }}
      - name: Install deps
        run: pip install -r scripts/forecast/requirements.txt

      - name: Run backtest
        env:
          SUPABASE_URL: ${{ secrets.DEV_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.DEV_SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          python -m scripts.forecast.backtest

      - name: Generate ACCURACY-LOG.md
        env:
          SUPABASE_URL: ${{ secrets.DEV_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.DEV_SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          python -m scripts.forecast.write_accuracy_log

      - name: Commit ACCURACY-LOG.md
        # No-op when file is byte-identical (idempotent run).
        # [skip ci] prevents the push from re-triggering this workflow
        # (docs/forecast/ is outside data/** but belt-and-suspenders).
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/forecast/ACCURACY-LOG.md
          if git diff --staged --quiet; then
            echo "No ACCURACY-LOG changes to commit"
            exit 0
          fi
          git commit -m "docs(forecast): update ACCURACY-LOG after data push [skip ci]"
          git push origin HEAD:main
