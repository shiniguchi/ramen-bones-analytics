name: Forecast Refresh
on:
  schedule:
    - cron: '0 7 * * 1'        # Mondays 07:00 UTC (09:00 Berlin) — Phase 15-09 D-16 weekly cadence; preserves Guard 8 cascade
  workflow_dispatch:
    inputs:
      models:
        description: 'Comma-separated model list (omit for all enabled)'
        required: false
        default: ''

# Least-privilege: only checkout + run python, no repo writes needed.
permissions:
  contents: read

# Single-flight: scheduled cron and manual workflow_dispatch must not race
# against each other on the same DB rows.
concurrency:
  group: forecast-refresh
  cancel-in-progress: false

jobs:
  forecast:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GITHUB_SHA: ${{ github.sha }}
      FORECAST_ENABLED_MODELS: 'sarimax,prophet,ets,theta,naive_dow'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/forecast/requirements.txt
      - name: Cache cmdstan binary
        uses: actions/cache@v4
        with:
          path: ~/.cmdstan
          key: cmdstan-${{ runner.os }}-${{ hashFiles('scripts/forecast/requirements.txt') }}
      - name: Install deps
        run: pip install -r scripts/forecast/requirements.txt
      - name: Run forecast pipeline
        # Inputs piped through env: vars (NOT direct ${{ }} in the script) so a
        # malicious workflow_dispatch caller cannot inject shell metacharacters.
        # Validate models input against a safe pattern before forwarding to argparse.
        # Service-role key scoped to THIS step only — keeps it out of pip install
        # and any future steps' environments.
        # Phase 16 D-06: run_all.py defaults to --track=both → BAU + CF fits in
        # one invocation. No YAML change needed for CF orchestration itself.
        env:
          SUPABASE_URL: ${{ secrets.DEV_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.DEV_SUPABASE_SERVICE_ROLE_KEY }}
          MODELS: ${{ inputs.models }}
        run: |
          set -euo pipefail
          ARGS=()
          if [ -n "${MODELS:-}" ]; then
            if ! echo "$MODELS" | grep -qE '^[a-z_]+(,[a-z_]+)*$'; then
              echo "ERROR: MODELS must be comma-separated lowercase identifiers" >&2
              exit 1
            fi
            ARGS+=("--models" "$MODELS")
          fi
          python -m scripts.forecast.run_all "${ARGS[@]}"

      - name: Run cumulative uplift
        # Phase 16 (UPL-04 / UPL-07): aggregates Track-B forecasts into
        # campaign_uplift_v + fires off-week reminder via atomic UPDATE on
        # feature_flags. Runs AFTER BAU+CF fits, BEFORE the final MV refresh
        # so the campaign_uplift backing table is populated when MVs rebuild.
        env:
          SUPABASE_URL: ${{ secrets.DEV_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.DEV_SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          python -m scripts.forecast.cumulative_uplift

      - name: Refresh forecast MVs
        # Phase 16: explicit MV refresh AFTER cumulative_uplift so any MV-backed
        # view (campaign_uplift_v wrapper) sees freshly upserted backing rows.
        # The RPC is idempotent — calling it again after run_all is safe.
        env:
          SUPABASE_URL: ${{ secrets.DEV_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.DEV_SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          python -c "
          from scripts.forecast.db import make_client
          c = make_client()
          c.rpc('refresh_forecast_mvs', {}).execute()
          "
